<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* LEFT PANEL */
  .left {
    flex: 1;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }

  .left::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 60%, rgba(131,58,180,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(253,29,29,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .logo {
    width: 56px;
    height: 56px;
    margin-bottom: 40px;
  }

  .tagline {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
    max-width: 480px;
    margin-bottom: 50px;
  }

  .tagline span {
    background: linear-gradient(90deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Phone mockups */
  .phones {
    position: relative;
    width: 420px;
    height: 340px;
  }

  .phone {
    position: absolute;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .phone-1 {
    width: 160px;
    height: 280px;
    left: 60px;
    top: 20px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    z-index: 2;
    transform: rotate(-8deg);
  }

  .phone-2 {
    width: 160px;
    height: 260px;
    left: 160px;
    top: 0;
    background: linear-gradient(135deg, #0f3460, #533483);
    z-index: 3;
    transform: rotate(3deg);
  }

  .phone-3 {
    width: 145px;
    height: 240px;
    left: 270px;
    top: 40px;
    background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
    z-index: 2;
    transform: rotate(10deg);
  }

  .phone-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    opacity: 0.6;
  }

  .heart {
    position: absolute;
    width: 32px;
    height: 32px;
    left: 120px;
    top: 160px;
    z-index: 10;
    filter: drop-shadow(0 0 8px rgba(255,80,80,0.8));
  }

  .star-badge {
    position: absolute;
    right: 155px;
    top: 80px;
    background: #4CAF50;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* RIGHT PANEL */
  .right {
    width: 520px;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 40px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-align: left;
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .form-group {
    margin-bottom: 12px;
  }

  input {
    width: 100%;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 15px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }

  input::placeholder { color: #888; }

  input:focus {
    border-color: #555;
    background: #2f2f2f;
  }

  .btn-login {
    width: 100%;
    background: #1877f2;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    margin-bottom: 20px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-login:hover { background: #1565d8; }
  .btn-login:active { transform: scale(0.98); }

  .forgot {
    text-align: center;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 32px;
    display: block;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #3a3a3a;
  }

  .btn-facebook {
    width: 100%;
    background: transparent;
    color: #fff;
    border: 1px solid #3a3a3a;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s;
  }

  .btn-facebook:hover { background: #2a2a2a; }

  .btn-facebook svg {
    width: 20px;
    height: 20px;
  }

  .btn-signup {
    width: 100%;
    background: transparent;
    color: #1877f2;
    border: 1px solid #1877f2;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 28px;
    transition: background 0.2s;
  }

  .btn-signup:hover { background: rgba(24,119,242,0.08); }

  .meta-logo {
    text-align: center;
    color: #555;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .meta-logo svg {
    width: 38px;
    height: 14px;
    fill: #555;
  }
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <!-- Instagram logo SVG -->
  <svg class="logo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ig-grad" x1="0" y1="56" x2="56" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#f09433"/>
        <stop offset="25%" stop-color="#e6683c"/>
        <stop offset="50%" stop-color="#dc2743"/>
        <stop offset="75%" stop-color="#cc2366"/>
        <stop offset="100%" stop-color="#bc1888"/>
      </linearGradient>
    </defs>
    <rect width="56" height="56" rx="14" fill="url(#ig-grad)"/>
    <circle cx="28" cy="28" r="10" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="40" cy="16" r="3" fill="white"/>
  </svg>

  <h1 class="tagline">See everyday moments from your <span>close friends.</span></h1>

  <div class="phones">
    <div class="phone phone-1">
      <div class="phone-inner">📸</div>
    </div>
    <div class="phone phone-2">
      <div class="phone-inner">🤳</div>
    </div>
    <div class="phone phone-3">
      <div class="phone-inner">🎉</div>
    </div>

    <!-- Heart -->
    <svg class="heart" viewBox="0 0 32 32" fill="#ff4444" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 28s-14-8.5-14-17C2 6.7 5.7 3 10 3c2.5 0 4.7 1.2 6 3.1C17.3 4.2 19.5 3 22 3c4.3 0 8 3.7 8 8 0 8.5-14 17-14 17z"/>
    </svg>

    <!-- Star badge -->
    <div class="star-badge">⭐ Close Friend</div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <button class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Log into Instagram
  </button>

  <div class="form-group">
    <input type="text" placeholder="Mobile number, username or email">
  </div>

  <div class="form-group">
    <input type="password" placeholder="Password">
  </div>

  <button class="btn-login">Log in</button>

  <a href="#" class="forgot">Forgot password?</a>

  <button class="btn-facebook">
    <!-- Facebook icon -->
    <svg viewBox="0 0 24 24" fill="#1877f2" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 12c0-6.627-5.373-12-12-12S0 5.373 0 12c0 5.99 4.388 10.954 10.125 11.854V15.47H7.078V12h3.047V9.356c0-3.007 1.792-4.668 4.533-4.668 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874V12h3.328l-.532 3.47h-2.796v8.385C19.612 22.954 24 17.99 24 12z"/>
    </svg>
    Log in with Facebook
  </button>

  <button class="btn-signup">Create new account</button>

  <!-- Meta logo -->
  <div class="meta-logo">
    <svg viewBox="0 0 60 22" xmlns="http://www.w3.org/2000/svg">
      <path d="M6.2 11.2C6.2 8.5 7.4 6.4 9 6.4c1.3 0 2.1 1.1 2.4 2.8L13.1 7c-.8-2.5-2.4-4-4.1-4C5.5 3 3 6.7 3 11.2s2.5 8.2 6 8.2c1.7 0 3.3-1.5 4.1-4l-1.7-2.2c-.3 1.7-1.1 2.8-2.4 2.8-1.6 0-2.8-2.1-2.8-4.8zm11.5-8H15v16h2.7V3.2zm8.3 0h-4.3v16H24v-6.5h2c2.8 0 5-1.8 5-4.8S28.8 3.2 26 3.2zm0 7.3H24V5.6h2c1.4 0 2.3.9 2.3 2.4 0 1.5-.9 2.5-2.3 2.5zm13.5-7.3h-7.5v16h7.5v-2.4h-4.8v-4.4h4.3V10H34.5V5.6h4.8V3.2z" fill="#555"/>
    </svg>
    Meta
  </div>
</div>

</body>
</html>
